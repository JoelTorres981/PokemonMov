<ion-header>
  <ion-toolbar>
    <ion-title>Pokémon List</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar [debounce]="1000" (ionInput)="handleInput($event)" placeholder="Buscar Pokémon" animated
    showCancelButton="always" cancelButtonText="Cancelar">
  </ion-searchbar>
  <ion-list>
    <ion-item *ngFor="let pokemon of pokemons">
      <ion-label>{{ pokemon.name | titlecase }}</ion-label>
      <a href="{{ pokemon.url}}"><ion-label>{{ pokemon.url}}</ion-label></a>

    </ion-item>

  </ion-list>

  <ion-spinner *ngIf="loading" class="loading-spinner"></ion-spinner>
</ion-content>
